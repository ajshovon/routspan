name: Release

# Publishes signed, per-architecture release APKs to the GitHub Releases page
# whenever a version tag (e.g. v0.1.0) is pushed.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64    base64 of your upload-keystore.jks  (base64 -i upload-keystore.jks | pbcopy)
#   KEYSTORE_PASSWORD  the store password you chose with keytool
#   KEY_PASSWORD       the key password you chose with keytool (often the same)
#   KEY_ALIAS          the alias you chose with keytool (e.g. upload)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  release:
    name: Build & publish signed APKs
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (not a mutable tag) so
      # a repointed tag can't inject code into a job that holds the signing secrets.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build split-per-ABI release APKs
        run: |
          flutter build apk --release --split-per-abi \
            --build-name="${{ steps.version.outputs.version }}" \
            --build-number="${{ github.run_number }}"

      - name: Rename APKs by arch
        id: rename
        run: |
          v="${{ steps.version.outputs.version }}"
          dir=build/app/outputs/flutter-apk
          mkdir -p dist
          for abi in armeabi-v7a arm64-v8a x86_64; do
            src="$dir/app-$abi-release.apk"
            [ -f "$src" ] && cp "$src" "dist/routspan-$v-$abi.apk"
          done
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)
          ls -l dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: Routspan ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/routspan-*.apk
            dist/SHA256SUMS.txt

      # Never leave signing material on the runner's workspace cache.
      - name: Clean up signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties
